name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('frontend/android/**/*.gradle*', 'frontend/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Prebuild (generate native Android files)
        run: cd frontend && npx expo prebuild --platform android --clean --no-install

      - name: Create assets directory
        run: mkdir -p frontend/android/app/src/main/assets

      - name: Bundle JS for release
        run: |
          cd frontend
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Remove duplicate drawable resources
        run: |
          cd frontend/android/app/src/main/res
          find . -name "*.png" -path "*/drawable-*" -delete 2>/dev/null || true

      - name: Make gradlew executable
        run: chmod +x frontend/android/gradlew

      - name: Build release APK
        run: cd frontend/android && ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: urbanfix-release
          path: frontend/android/app/build/outputs/apk/release/app-release.apk
